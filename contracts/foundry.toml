[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
base     = "https://mainnet.base.org"
base_sep = "https://sepolia.base.org"

[etherscan]
base     = { key = "${BASESCAN_KEY}", url = "https://api.basescan.org/api" }
